server {
  listen 80;
  server_name TU_DOMINIO;

  # si ya manejás SSL con otro include / certbot, redirigí a HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name TU_DOMINIO;

  # tus certificados / includes (depende cómo los manejes)
  # ssl_certificate ...
  # ssl_certificate_key ...

  # Tamaño por si batch crece
  client_max_body_size 2m;

  location /healthz {
    proxy_pass http://127.0.0.1:8001/healthz;
    proxy_set_header Host $host;
  }

  location /readyz {
    proxy_pass http://127.0.0.1:8001/readyz;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }
}
