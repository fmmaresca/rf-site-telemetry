openapi: 3.0.3
info:
  title: RF Site Telemetry Cloud API
  version: 0.1.0
paths:
  /healthz:
    get:
      responses:
        "200":
          description: OK
  /v1/ingest:
    post:
      summary: Ingest telemetry (single or batch)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/TelemetryEventV1"
                - $ref: "#/components/schemas/TelemetryBatchV1"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
  /v1/devices:
    get:
      summary: List devices (MVP)
      responses:
        "200":
          description: OK
  /v1/devices/{device_id}/latest:
    get:
      summary: Latest telemetry for device
      parameters:
        - in: path
          name: device_id
          required: true
          schema: { type: string }
        - in: query
          name: tenant
          required: false
          schema: { type: string, default: demo }
      responses:
        "200":
          description: OK
        "404":
          description: No data
  /v1/devices/{device_id}/series:
    get:
      summary: Time series for a metric
      parameters:
        - in: path
          name: device_id
          required: true
          schema: { type: string }
        - in: query
          name: tenant
          required: false
          schema: { type: string, default: demo }
        - in: query
          name: metric
          required: true
          schema: { type: string }
        - in: query
          name: from_ts
          required: false
          schema: { type: string }
        - in: query
          name: to_ts
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 2000, minimum: 1, maximum: 10000 }
      responses:
        "200":
          description: OK
components:
  schemas:
    TelemetryEventV1:
      type: object
      required: [v, tenant, device_id, ts, seq, msg_id, metrics]
      properties:
        v: { type: integer, enum: [1] }
        tenant: { type: string }
        device_id: { type: string }
        ts: { type: string, format: date-time }
        seq: { type: integer, format: int64, minimum: 0 }
        msg_id: { type: string }
        metrics:
          type: object
          additionalProperties: { type: number }
        status:
          type: object
          additionalProperties: true
    TelemetryBatchV1:
      type: object
      required: [v, tenant, device_id, events]
      properties:
        v: { type: integer, enum: [1] }
        tenant: { type: string }
        device_id: { type: string }
        events:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryEventV1"
    IngestResult:
      type: object
      required: [accepted, deduped, rejected]
      properties:
        accepted: { type: integer }
        deduped: { type: integer }
        rejected: { type: integer }
